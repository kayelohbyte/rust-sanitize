    text: "DEBUG connecting with password={{SECRET}},ssl=True retries=3"
    secret: "hunter~|~2secre~|~t"
  - label: password_kv
    text: "PGPASSWD: '{{SECRET}}' # rotated 2026-05"
    secret: "tr0ub4~|~dor&3x"
