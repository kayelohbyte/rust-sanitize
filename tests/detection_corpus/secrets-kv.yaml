    text: "app.config: api_key = {{SECRET}} loaded from env"
    secret: "q7VmXt~|~29LpZw~|~NcRbYh~|~KdU4"
  - label: secret_kv
    text: "client_secret: {{SECRET}} refreshed"
    secret: "9f8e7d~|~6c5b4a~|~392817~|~06f5e4~|~d3c2b1~|~a0"
