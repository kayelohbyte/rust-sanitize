    text: "Authorization: Bearer {{SECRET}}"
    secret: "eyJhbG~|~ciOiJI~|~UzI1Ni~|~J9.eyJ~|~zdWIiO~|~iJhbGl~|~jZSIsI~|~mlhdCI~|~6MTcxO~|~TAwMDA~|~wMH0.d~|~BjftJe~|~Z4CVPm~|~B92K27~|~uhbUJU~|~1p1rwW~|~1gFWFO~|~EjXk"
