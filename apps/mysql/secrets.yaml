# MySQL / MariaDB — connection strings with embedded credentials

# mysql:// URI with username:password
- kind: regex
  pattern: '\b(mysql://[^\s:@/]{1,50}:[^\s:@/]{3,88}@[-.%\w]+(?::\d{1,5})?[^\s"''<>]*)(?=\s|["''>]|$)'
  category: url
  label: mysql_connection_uri

- kind: allow
  values:
    - "mysql"
    - "mariadb"
    - "mysql.com"
    - "mariadb.org"
    - "localhost:3306"
    - "127.0.0.1:3306"
    - "mysql://localhost"
    - "mysql://127.0.0.1"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
