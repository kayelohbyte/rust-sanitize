# Kubernetes — service account tokens, kubeconfig credentials

# Kubernetes service account token — JWT with any JOSE algorithm header (RS256, ES256, PS256…)
- kind: regex
  pattern: '\b(eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,})\b'
  category: auth_token
  label: k8s_service_account_jwt

# Kubernetes bearer token in kubeconfig or API request context
- kind: regex
  pattern: '(?i)(?:bearer|token)[\s:="'']+([A-Za-z0-9_.-]{40,})\b'
  category: auth_token
  label: k8s_bearer_token

- kind: allow
  values:
    - "kubernetes"
    - "kubectl"
    - "k8s.io"
    - "kubernetes.io"
    - "kubernetes.default"
    - "kubernetes.default.svc"
    - "kubernetes.default.svc.cluster.local"
    - "cluster.local"
    - "kube-system"
    - "default"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
