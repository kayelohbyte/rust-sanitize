# postgresql.conf and .pgpass field-level sanitization
- processor: key-value
  extensions: [".conf"]
  include: ["postgresql.conf", "pg_ident.conf"]
  fields:
    - pattern: "password"
      category: custom:password
      label: pg_password
    - pattern: "ssl_cert_file"
      category: file_path
      label: pg_ssl_cert
    - pattern: "ssl_key_file"
      category: file_path
      label: pg_ssl_key
    - pattern: "ssl_ca_file"
      category: file_path
      label: pg_ssl_ca
    - pattern: "ssl_crl_file"
      category: file_path
      label: pg_ssl_crl
    - pattern: "krb_server_keyfile"
      category: file_path
      label: pg_krb_keyfile

- processor: key-value
  extensions: [".pgpass"]
  include: [".pgpass", "pgpass"]
  options:
    delimiter: ":"
    comment_prefix: "#"
  fields:
    - pattern: "*"
      category: custom:password
      label: pgpass_entry
