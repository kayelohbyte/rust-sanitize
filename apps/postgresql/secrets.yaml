# PostgreSQL — postgresql.conf, connection strings, pg_hba.conf, pg logs
- kind: regex
  pattern: '(?i)\bpassword authentication failed for user "([^"]{1,64})"'
  category: name
  label: pg_failed_auth_user

- kind: regex
  pattern: '(?i)\bjdbc:postgresql://[^\s"''<>]+'
  category: url
  label: pg_jdbc_url
