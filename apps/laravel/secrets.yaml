# Laravel — APP_KEY, Passport tokens, Stripe, Pusher secrets

# Laravel APP_KEY — base64-encoded 256-bit key (base64: prefix, 44-char payload)
- kind: regex
  pattern: '(?i)APP_KEY[\s:="'']+base64:([A-Za-z0-9+/]{43}=)'
  category: auth_token
  label: laravel_app_key

- kind: allow
  values:
    - "laravel"
    - "laravel.com"
    - "laravel-echo-server"
    - "localhost:8000"
    - "127.0.0.1:8000"
    - "pusher.com"
    - "soketi"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
