# Terraform — Terraform Cloud personal tokens, Atlas tokens, TFE API tokens

# Terraform Cloud / Atlas personal token
- kind: regex
  pattern: '\b([A-Za-z0-9]{14}\.atlasv1\.[A-Za-z0-9]{67})\b'
  category: auth_token
  label: terraform_cloud_token

# Terraform Enterprise (TFE) API token — context-keyed (appears in credentials.tfrc.json)
- kind: regex
  pattern: '(?i)(?:tfe[_-]?token|terraform[_-]?token|TFE_TOKEN|TERRAFORM_TOKEN)[\s:="'']+([A-Za-z0-9._-]{20,})'
  category: auth_token
  label: terraform_enterprise_token

# Terraform login token stored in ~/.terraform/credentials.tfrc.json
- kind: regex
  pattern: '"token"\s*:\s*"([A-Za-z0-9._-]{20,})"'
  category: auth_token
  label: terraform_credentials_token

- kind: allow
  values:
    - "terraform"
    - "terraform.io"
    - "registry.terraform.io"
    - "app.terraform.io"
    - "releases.hashicorp.com"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
    - "00000000-0000-0000-0000-000000000000"
    - "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    - "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
    - "12345678-1234-1234-1234-123456789abc"
