# Ruby on Rails — database.yml, .env, config/secrets.yml

# Rails secret_key_base — 128 hex chars (64 random bytes)
- kind: regex
  pattern: '(?i)SECRET_KEY_BASE[\s:="'']+([a-f0-9]{128})\b'
  category: auth_token
  label: rails_secret_key_base

- kind: allow
  values:
    - "rails"
    - "rubyonrails.org"
    - "rubygems.org"
    - "localhost:3000"
    - "127.0.0.1:3000"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
