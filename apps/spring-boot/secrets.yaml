# Spring Boot — application.yml, application.properties, datasource credentials

# Jasypt-encrypted property value: ENC(...) appears in .properties and .yml files
- kind: regex
  pattern: 'ENC\(([^)]{8,})\)'
  category: auth_token
  label: spring_jasypt_encrypted

- kind: allow
  values:
    - "spring"
    - "spring.io"
    - "spring-boot"
    - "springframework.org"
    - "localhost:8080"
    - "127.0.0.1:8080"
    - "actuator"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
