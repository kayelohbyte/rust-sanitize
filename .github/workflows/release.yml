name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sanitize

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -DestinationPath "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.* > ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.*

  build-mcp:
    name: Build MCP ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary: sanitize-mcp
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: sanitize-mcp
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: sanitize-mcp
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: sanitize-mcp.exe

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: >
          deno compile
          --allow-run --allow-env --allow-read --allow-write
          --target ${{ matrix.target }}
          --output ${{ matrix.binary }}
          mcp/src/index.ts

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: tar czf sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.* > sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: sanitize-mcp-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: [build, build-mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
